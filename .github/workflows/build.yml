name: Build ERPNext v16 Custom Images
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout frappe_docker
        uses: actions/checkout@v4
        with:
          repository: frappe/frappe_docker
          
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set APPS_JSON
        run: |
          export APPS_JSON_BASE64=$(echo '[{"url":"https://github.com/frappe/erpnext","branch":"version-16"},{"url":"https://github.com/frappe/hrms","branch":"version-16"}]' | base64 -w 0)
          echo "APPS_JSON_BASE64=$APPS_JSON_BASE64" >> $GITHUB_ENV
          
      - name: Build Backend Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: images/custom/Containerfile
          target: backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/erpnext-worker:v16
          build-args: |
            FRAPPE_BRANCH=version-16
            APPS_JSON_BASE64=${{ env.APPS_JSON_BASE64 }}
            
      - name: Build Frontend Nginx
        uses: docker/build-push-action@v5
        with:
          context: .
          file: images/custom/Containerfile
          target: frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/erpnext-nginx:v16
          build-args: |
            FRAPPE_BRANCH=version-16
            APPS_JSON_BASE64=${{ env.APPS_JSON_BASE64 }}