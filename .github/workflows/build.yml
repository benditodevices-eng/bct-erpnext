name: Build ERPNext v16 Custom Image
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout frappe_docker
        uses: actions/checkout@v6
        with:
          repository: frappe/frappe_docker
          
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Create apps.json secret
        run: |
          echo '[{"url":"https://github.com/frappe/erpnext","branch":"version-16"},{"url":"https://github.com/frappe/hrms","branch":"version-16"},{"url":"https://github.com/frappe/offsite_backups"},{"url":"https://github.com/zerodhatech/Frappe-attachments-s3.git","branch":"master"},{"url":"https://github.com/developmentforpeople/dfp_external_storage.git","branch":"version-15"}]' > apps.json

      - name: Patch Containerfile for HRMS Vite
        run: |
          sed -i 's/echo "{}" >/echo "{\"socketio_port\": 9000}" >/g' images/custom/Containerfile
          
      - name: Build and Push Custom Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/custom/Containerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/erpnext-custom:v16
          build-args: |
            FRAPPE_BRANCH=version-16
          secret-files: |
            apps_json=./apps.json